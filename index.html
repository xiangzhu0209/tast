<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歐昇計價特訓系統</title>
    <!-- 引入 Tailwind CSS 快速美化 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入圓體字型 -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; background-color: #f0f2f5; }
        .key-btn { touch-action: manipulation; transition: transform 0.1s, background-color 0.2s; }
        .key-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Login Screen -->
    <div class="card w-full max-w-sm bg-white rounded-3xl shadow-xl p-8" id="login-screen">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-8">歐昇特訓系統</h1>
        <div class="space-y-4">
            <input type="text" id="employee-name" class="w-full text-lg p-5 border-2 border-blue-100 rounded-2xl focus:border-blue-400 outline-none" placeholder="請輸入姓名" />
            <button onclick="startQuiz()" class="w-full py-5 bg-blue-600 text-white text-xl font-bold rounded-2xl shadow-lg hover:bg-blue-700 active:scale-95 transition">開始特訓</button>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div class="card w-full max-w-sm bg-white rounded-3xl shadow-xl p-6" id="quiz-screen" style="display: none;">
        <!-- Stats -->
        <div class="flex justify-between items-center text-gray-500 font-medium mb-6">
            <span class="bg-gray-100 px-3 py-1 rounded-full">第 <span id="q-num">1</span> 題</span>
            <span id="timer-text" class="text-xl">🕒 00:00</span>
            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full">✅ 0 | ❌ 0</span>
        </div>
        
        <!-- Question Box -->
        <div class="bg-blue-50 p-6 rounded-2xl border border-blue-100 mb-6 text-blue-900 text-lg leading-relaxed shadow-inner">
            <div id="question-text">
                尺寸: 寬 4.3 尺 × 高 8.4 尺<br>
                產品: 穿透簾<br>
                單價: 320
            </div>
        </div>
        
        <!-- Large Display -->
        <div id="display-area" class="w-full h-20 flex items-center justify-center text-4xl font-bold text-gray-700 bg-gray-50 border-2 border-gray-200 rounded-2xl mb-6 shadow-inner">
            0
        </div>

        <!-- Keypad -->
        <div class="grid grid-cols-3 gap-3 mb-6">
            <button class="key-btn py-5 text-2xl font-bold bg-gray-100 rounded-2xl" onclick="inputNum(1)">1</button>
            <button class="key-btn py-5 text-2xl font-bold bg-gray-100 rounded-2xl" onclick="inputNum(2)">2</button>
            <button class="key-btn py-5 text-2xl font-bold bg-gray-100 rounded-2xl" onclick="inputNum(3)">3</button>
            <button class="key-btn py-5 text-2xl font-bold bg-gray-100 rounded-2xl" onclick="inputNum(4)">4</button>
            <button class="key-btn py-5 text-2xl font-bold bg-gray-100 rounded-2xl" onclick="inputNum(5)">5</button>
            <button class="key-btn py-5 text-2xl font-bold bg-gray-100 rounded-2xl" onclick="inputNum(6)">6</button>
            <button class="key-btn py-5 text-2xl font-bold bg-gray-100 rounded-2xl" onclick="inputNum(7)">7</button>
            <button class="key-btn py-5 text-2xl font-bold bg-gray-100 rounded-2xl" onclick="inputNum(8)">8</button>
            <button class="key-btn py-5 text-2xl font-bold bg-gray-100 rounded-2xl" onclick="inputNum(9)">9</button>
            <button class="key-btn py-5 text-2xl font-bold bg-orange-100 text-orange-600 rounded-2xl" onclick="clearDisplay()">C</button>
            <button class="key-btn py-5 text-2xl font-bold bg-gray-100 rounded-2xl" onclick="inputNum(0)">0</button>
            <button class="key-btn py-5 text-2xl font-bold bg-red-100 text-red-600 rounded-2xl" onclick="delNum()">⌫</button>
        </div>

        <!-- Submit Buttons -->
        <button class="w-full py-5 bg-blue-600 text-white text-xl font-bold rounded-2xl shadow-lg hover:bg-blue-700 mb-3 active:scale-95 transition" onclick="checkAnswer()">送出答案</button>
        <button class="w-full py-4 text-gray-400 text-sm font-medium hover:text-gray-600 transition" onclick="finishQuiz()">結束測驗 & 產出報告</button>
    </div>

<script>
    let startTime, timerInterval;

    function startQuiz() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        startTime = new Date();
        timerInterval = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        const diff = Math.floor((new Date() - startTime) / 1000);
        const mins = Math.floor(diff / 60).toString().padStart(2, '0');
        const secs = (diff % 60).toString().padStart(2, '0');
        document.getElementById('timer-text').innerText = `🕒 ${mins}:${secs}`;
    }

    function inputNum(n) {
        let disp = document.getElementById('display-area');
        if (disp.innerText === '0') disp.innerText = n;
        else disp.innerText += n;
    }

    function clearDisplay() { document.getElementById('display-area').innerText = '0'; }
    function delNum() {
        let disp = document.getElementById('display-area');
        disp.innerText = disp.innerText.slice(0, -1) || '0';
    }

    function checkAnswer() { 
        // 這裡可以加入後續判定邏輯
    }
    
    function finishQuiz() { 
        clearInterval(timerInterval); 
        location.reload(); // 簡單的重置方式
    }
</script>

</body>
</html>
