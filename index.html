<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>窗簾計價特訓系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* 移除手機端點擊的預設灰色高光 */
        * { -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background-color: #f4f7f6; color: #333; max-width: 600px; margin: 0 auto; line-height: 1.6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; font-size: 15px; margin-bottom: 15px; }
        .q-num { color: #3498db; }
        .score-board { color: #7f8c8d; }
        .score-correct { color: #2ecc71; margin-right: 8px;}
        .score-wrong { color: #e74c3c; }
        
        /* 題目框優化 */
        .question-box { background: #e8f4f8; padding: 15px; border-radius: 8px; font-size: 17px; margin-bottom: 15px; font-weight: bold; line-height: 1.5; }
        
        /* 輸入框防選取優化 */
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; font-size: 20px; border: 2px solid #bdc3c7; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; text-align: center; font-weight: bold; user-select: none; -webkit-user-select: none; outline: none; }
        
        /* 按鈕加入 touch-action: manipulation 防止雙擊延遲 */
        button { width: 100%; padding: 15px; font-size: 18px; color: white; background-color: #3498db; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.2s; touch-action: manipulation; }
        button:active { background-color: #2980b9; transform: scale(0.98); }
        
        .btn-next { background-color: #2ecc71; display: none; }
        .btn-report { background-color: #9b59b6; margin-top: 15px; }
        
        .result { padding: 15px; border-radius: 8px; margin-top: 10px; display: none; font-size: 15px; white-space: pre-line; line-height: 1.5; }
        .correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .wrong { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        #quiz-screen, #report-screen { display: none; }
        .report-box { background: #34495e; color: white; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 14px; white-space: pre-wrap; margin-bottom: 15px; line-height: 1.8; }

        /* 數字鍵盤優化，按鈕稍微加高方便點擊 */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .numpad button { margin-bottom: 0; padding: 18px 0; font-size: 24px; background-color: #ecf0f1; color: #2c3e50; border-radius: 8px; box-shadow: 0 4px 0 #bdc3c7; border: 1px solid #d5dbdb; }
        .numpad button:active { box-shadow: 0 0 0 #bdc3c7; transform: translateY(4px); }
        .numpad .numpad-action { background-color: #e74c3c; color: white; box-shadow: 0 4px 0 #c0392b; border: none; }
        .numpad .numpad-clear { background-color: #f39c12; color: white; box-shadow: 0 4px 0 #d68910; border: none; }
    </style>
</head>
<body>

<div class="card" id="login-screen">
    <h1>歐昇特訓系統</h1>
    <p style="text-align: center; color: #7f8c8d; font-weight: bold; font-size: 15px;">請輸入您的姓名以開始測驗</p>
    <input type="text" id="employee-name" placeholder="請輸入姓名 (例如: 湘筑)" />
    <button onclick="startQuiz()">開始特訓</button>
</div>

<div class="card" id="quiz-screen">
    <h1>窗簾計價特訓系統</h1>
    <div class="stats">
        <span id="q-num" class="q-num">第 1 題</span>
        <span class="score-board">
            <span id="score-correct" class="score-correct">✅ 0</span>
            <span id="score-wrong" class="score-wrong">❌ 0</span>
        </span>
    </div>
    
    <div class="question-box" id="question-text">載入題目中...</div>
    
    <input type="text" id="user-answer" readonly placeholder="請使用下方鍵盤輸入" />
    
    <div id="numpad-container" class="numpad">
        <button onclick="numpadPress('1')">1</button>
        <button onclick="numpadPress('2')">2</button>
        <button onclick="numpadPress('3')">3</button>
        <button onclick="numpadPress('4')">4</button>
        <button onclick="numpadPress('5')">5</button>
        <button onclick="numpadPress('6')">6</button>
        <button onclick="numpadPress('7')">7</button>
        <button onclick="numpadPress('8')">8</button>
        <button onclick="numpadPress('9')">9</button>
        <button class="numpad-clear" onclick="numpadClear()">C</button>
        <button onclick="numpadPress('0')">0</button>
        <button class="numpad-action" onclick="numpadBackspace()">⌫</button>
    </div>
    
    <button id="submit-btn" onclick="checkAnswer()">送出答案</button>
    
    <hr style="border: 1px solid #eee; margin: 15px 0;">
    <button class="btn-report" onclick="finishQuiz()">結束測驗 & 產出報告</button>
    
    <div id="result-box" class="result"></div>
</div>

<div class="card" id="report-screen">
    <h1>結果戰報</h1>
    <p style="text-align: center; font-weight: bold; color: #e74c3c;">請點擊下方按鈕複製，並回傳給湘筑</p>
    <div class="report-box" id="report-text"></div>
    <button onclick="copyReport()" style="background-color: #00B900;">📋 複製戰報 (回報 LINE)</button>
    <button onclick="location.reload()" style="background-color: #95a5a6; margin-top: 10px;">重新開始</button>
</div>

<script>
    let currentQ = {};
    let qCount = 0;
    let firstTryCorrectCount = 0;
    let wrongCount = 0;
    let attemptCount = 0;
    
    let userName = "";
    let startTime = null;
    let autoNextTimeout = null; 

    let currentInputValue = "";

    function updateInputDisplay() {
        if (currentInputValue === "") {
            document.getElementById('user-answer').value = "";
        } else {
            document.getElementById('user-answer').value = new Intl.NumberFormat('en-US').format(currentInputValue);
        }
    }

    function numpadPress(num) {
        currentInputValue += num;
        updateInputDisplay();
    }

    function numpadBackspace() {
        currentInputValue = currentInputValue.slice(0, -1);
        updateInputDisplay();
    }

    function numpadClear() {
        currentInputValue = "";
        updateInputDisplay();
    }

    function startQuiz() {
        const nameInput = document.getElementById('employee-name').value.trim();
        if (!nameInput) {
            alert("請輸入姓名！");
            return;
        }
        userName = nameInput;
        startTime = new Date(); 
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        generateQuestion();
    }

    function getRandom10(min, max) {
        return Math.floor(Math.random() * ((max - min) / 10 + 1)) * 10 + min;
    }

    function getRandomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function generateQuestion() {
        if (autoNextTimeout) {
            clearTimeout(autoNextTimeout);
            autoNextTimeout = null;
        }

        qCount++;
        attemptCount = 0; 
        
        currentInputValue = "";
        updateInputDisplay();
        
        document.getElementById('q-num').innerText = `第 ${qCount} 題`;
        document.getElementById('numpad-container').style.pointerEvents = 'auto';
        document.getElementById('numpad-container').style.opacity = '1';
        document.getElementById('submit-btn').style.display = 'block';
        document.getElementById('result-box').style.display = 'none';

        const areaTypes = ['捲簾', '調光簾', '木百葉', '風琴簾', '穿透簾', '拉門'];
        const clothTypes = ['五尺折景簾', '五尺蛇簾', '九尺折景簾', '九尺蛇簾'];
        
        let type = '';
        if (Math.random() < 0.3) {
            type = getRandomItem(areaTypes);
        } else {
            type = getRandomItem(clothTypes);
        }

        const w_cm = Math.floor(Math.random() * (380 - 60 + 1)) + 60;
        const h_cm = Math.floor(Math.random() * (265 - 90 + 1)) + 90;
        
        const w_ft = Math.ceil((w_cm / 30.3) * 10) / 10;
        const h_ft = Math.ceil((h_cm / 30.3) * 10) / 10;

        const isCmUnit = Math.random() < 0.5;
        
        let unitPrice = 0;
        let trackPrice = 0;
        let multi = 0;

        if (type === '捲簾') unitPrice = getRandom10(110, 150);
        else if (type === '調光簾') unitPrice = getRandom10(130, 350);
        else if (type === '木百葉') unitPrice = getRandom10(280, 400);
        else if (type === '風琴簾') unitPrice = getRandom10(240, 480);
        else if (type === '穿透簾') unitPrice = getRandom10(250, 480);
        else if (type === '拉門') unitPrice = 100;
        else if (type.includes('五尺')) unitPrice = getRandom10(100, 250);
        else if (type.includes('九尺')) unitPrice = getRandom10(280, 450);

        if (type.includes('折景')) {
            multi = getRandomItem([2.0, 2.1, 2.2, 2.3, 2.4, 2.5]);
            trackPrice = 60;
        } else if (type.includes('蛇簾')) {
            multi = getRandomItem([2.7, 2.8, 2.9, 3.0, 3.1, 3.2, 3.3]);
            trackPrice = 130;
        }

        let total = 0;
        let processText = "";
        let qText = "";

        if (isCmUnit) {
            processText = `【尺寸轉換】\n寬: ${w_cm}cm ➔ ${w_ft}尺\n高: ${h_cm}cm ➔ ${h_ft}尺\n\n`;
            qText = `尺寸: 寬 ${w_cm} cm × 高 ${h_cm} cm<br>產品: ${type}<br>單價: ${unitPrice}`;
        } else {
            processText = `【尺寸資訊】\n寬: ${w_ft}尺\n高: ${h_ft}尺\n\n`;
            qText = `尺寸: 寬 ${w_ft} 尺 × 高 ${h_ft} 尺<br>產品: ${type}<br>單價: ${unitPrice}`;
        }

        if (['捲簾', '調光簾', '木百葉', '風琴簾', '穿透簾'].includes(type)) {
            let area = Math.ceil(w_ft * h_ft);
            let minArea = (type === '穿透簾') ? 35 : 15;
            let finalArea = Math.max(area, minArea);
            total = finalArea * unitPrice;
            processText += `【才數計算】\n${w_ft} × ${h_ft} = ${area}才 (進位後)\n防呆: ${minArea}才 ➔ 計價: ${finalArea}才\n總價: ${finalArea} × ${unitPrice} = ${total}元`;
        } 
        else if (type === '拉門') {
            let h_door_ceil = Math.ceil(h_ft);
            let h_door = Math.max(7, h_door_ceil);
            let area = Math.ceil(w_ft * h_door);
            let finalArea = Math.max(area, 20);
            total = finalArea * unitPrice;
            processText += `【高度陷阱】\n高 ${h_ft}尺 ➔ 進位至 ${h_door_ceil}尺\n最低7尺防呆 ➔ 計價高: ${h_door}尺\n【才數計算】\n${w_ft} × ${h_door} = ${area}才 (進位後)\n防呆: 20才 ➔ 計價: ${finalArea}才\n總價: ${finalArea} × ${unitPrice} = ${total}元`;
        }
        else {
            let track_ft = Math.max(5, Math.ceil(w_ft));
            let totalTrack = track_ft * trackPrice;
            processText += `【軌道】進位 ${Math.ceil(w_ft)}尺 (低消5尺) ➔ ${track_ft}尺\n價: ${track_ft} × ${trackPrice} = ${totalTrack}元\n\n`;

            if (type.includes('五尺')) {
                let panels = Math.ceil((w_ft * multi) / 5);
                let h_fab = Math.ceil(h_ft) + 1;
                let totalFab = Math.ceil(panels * h_fab);
                let totalFabPrice = totalFab * unitPrice;
                total = totalFabPrice + totalTrack;
                processText += `【布料(五尺)】\n幅: (${w_ft}×${multi})÷5 ➔ ${panels}幅\n高: ${Math.ceil(h_ft)}+1 = ${h_fab}尺\n總尺: ${panels}×${h_fab} = ${totalFab}尺\n價: ${totalFab} × ${unitPrice} = ${totalFabPrice}元\n總價: 布${totalFabPrice} + 軌${totalTrack} = ${total}元`;
            } else if (type.includes('九尺')) {
                let totalFab = Math.ceil(w_ft * multi);
                let effectivePrice = (h_cm > 250) ? unitPrice + 30 : unitPrice;
                let totalFabPrice = totalFab * effectivePrice;
                total = totalFabPrice + totalTrack;
                let h_warning = (h_cm > 250) ? `⚠️高>250cm加價➔單價${effectivePrice}\n` : `單價: ${effectivePrice}\n`;
                processText += `【布料(九尺)】\n尺數: ${w_ft}×${multi} ➔ ${totalFab}尺\n${h_warning}價: ${totalFab} × ${effectivePrice} = ${totalFabPrice}元\n總價: 布${totalFabPrice} + 軌${totalTrack} = ${total}元`;
            }
        }

        currentQ = { total: total, explanation: processText };

        if (multi > 0) qText += `<br>倍數: ${multi}倍 (軌道: ${trackPrice})`;
        
        document.getElementById('question-text').innerHTML = qText;
    }

    function checkAnswer() {
        const userAns = parseInt(currentInputValue);
        if (isNaN(userAns)) return alert("請輸入數字！");

        attemptCount++; 
        const resBox = document.getElementById('result-box');
        resBox.style.display = 'block';

        if (attemptCount === 1) {
            if (userAns === currentQ.total) {
                firstTryCorrectCount++;
                document.getElementById('score-correct').innerText = `✅ ${firstTryCorrectCount}`;
            } else {
                wrongCount++;
                document.getElementById('score-wrong').innerText = `❌ ${wrongCount}`;
            }
        }

        if (userAns === currentQ.total) {
            resBox.className = 'result correct';
            resBox.innerText = `✅ 答對了！\n\n( 即將進入下一題... )`;
            
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('numpad-container').style.pointerEvents = 'none';
            document.getElementById('numpad-container').style.opacity = '0.5';

            autoNextTimeout = setTimeout(generateQuestion, 500);

        } else {
            resBox.className = 'result wrong';
            if (attemptCount < 3) {
                resBox.innerText = `❌ 答錯了！(已計入錯誤題數)\n這是第 ${attemptCount} 次算錯，請再檢查一下！`;
                currentInputValue = ''; 
                updateInputDisplay();
            } else {
                resBox.innerText = `❌ 已經算錯 3 次囉！\n\n正確答案: ${new Intl.NumberFormat('en-US').format(currentQ.total)}\n\n` + currentQ.explanation + `\n\n📸 正在準備分享至相簿...`;
                document.getElementById('submit-btn').style.display = 'none';
                document.getElementById('numpad-container').style.pointerEvents = 'none';
                document.getElementById('numpad-container').style.opacity = '0.5';

                setTimeout(() => {
                    const captureArea = document.getElementById('quiz-screen');
                    html2canvas(captureArea).then(canvas => {
                        canvas.toBlob(blob => {
                            const file = new File([blob], `歐昇特訓_錯題_第${qCount}題.png`, { type: "image/png" });
                            
                            // 呼叫手機原生分享/儲存選單
                            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                                navigator.share({
                                    files: [file],
                                    title: '歐昇特訓錯題',
                                    text: `請點擊「儲存影像」存入相簿`
                                }).then(() => {
                                    generateQuestion();
                                }).catch(err => {
                                    // 即使取消分享也直接跳下一題
                                    generateQuestion(); 
                                });
                            } else {
                                // 備用方案：若是不支援的原生瀏覽器，退回下載模式
                                let link = document.createElement('a');
                                link.download = file.name;
                                link.href = canvas.toDataURL("image/png");
                                link.click();
                                generateQuestion();
                            }
                        }, "image/png");
                    });
                }, 500);
            }
        }
    }

    function finishQuiz() {
        if (autoNextTimeout) clearTimeout(autoNextTimeout);

        const totalDone = qCount - (document.getElementById('submit-btn').style.display === 'block' ? 1 : 0);
        
        if (totalDone === 0) {
            alert("你還沒有完成任何題目喔！");
            return;
        }

        const endTime = new Date();
        const timeDiff = Math.floor((endTime - startTime) / 1000);
        const minutes = Math.floor(timeDiff / 60);
        const seconds = timeDiff % 60;
        const accuracy = Math.round((firstTryCorrectCount / totalDone) * 100);

        const report = `📋【歐昇窗簾計價特訓戰報】\n` +
                       `🧑‍💼姓名：${userName}\n` +
                       `⏱️ 測驗時長：${minutes} 分 ${seconds} 秒\n` +
                       `-----------------------\n` +
                       `📊 總完成題數：${totalDone} 題\n` +
                       `✅ 答對：${firstTryCorrectCount} 題\n` +
                       `❌ 答錯：${wrongCount} 題\n` +
                       `🎯 答對率：${accuracy}%\n` +
                       `-----------------------\n` +
                       `※ 系統自動結算，請提交給湘筑。`;

        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('report-screen').style.display = 'block';
        document.getElementById('report-text').innerText = report;
    }

    function copyReport() {
        const reportText = document.getElementById('report-text').innerText;
        
        const textArea = document.createElement("textarea");
        textArea.value = reportText;
        document.body.appendChild(textArea);
        textArea.select();
        try {
            document.execCommand('copy');
            alert("✅ 戰報已複製！趕快去 LINE 群組貼上回報吧！");
        } catch (err) {
            alert("複製失敗，請手動選取上方文字複製。");
        }
        document.body.removeChild(textArea);
    }

</script>

</body>
</html>
