<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 關鍵：這是讓手機將網頁視為 APP 的關鍵 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="歐昇計價">
    
    <title>歐昇計價特訓系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 10px; background-color: #f4f7f6; color: #333; max-width: 600px; margin: 0 auto; line-height: 1.4; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        .question-box { background: #e8f4f8; padding: 10px; border-radius: 8px; font-size: 16px; margin-bottom: 10px; font-weight: bold; }
        
        /* 數字輸入顯示區 */
        #display-area { width: 100%; height: 50px; font-size: 24px; line-height: 50px; text-align: center; border: 2px solid #3498db; border-radius: 6px; margin-bottom: 10px; background: #fff; font-weight: bold; color: #2c3e50; }

        /* 數字鍵盤樣式 */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .key { padding: 15px; font-size: 20px; font-weight: bold; background: #ecf0f1; border: none; border-radius: 8px; cursor: pointer; }
        .key:active { background: #bdc3c7; }
        .key-del { background: #e74c3c; color: white; }
        .key-ok { background: #2ecc71; color: white; grid-column: span 2; }

        button { width: 100%; padding: 12px; font-size: 16px; color: white; background-color: #3498db; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 8px; }
        .btn-next { background-color: #2ecc71; display: none; }
        .btn-report { background-color: #9b59b6; margin-top: 10px; }
        .result { padding: 10px; border-radius: 8px; margin-top: 10px; display: none; font-size: 14px; }
        
        #quiz-screen, #report-screen { display: none; }
        .report-box { background: #34495e; color: white; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 14px; white-space: pre-wrap; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card" id="login-screen">
    <h1>歐昇特訓系統</h1>
    <p style="text-align: center; color: #7f8c8d; font-weight: bold;">請輸入姓名開始</p>
    <input type="text" id="employee-name" style="width:100%; padding:12px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;" placeholder="例如: 湘筑" />
    <button onclick="startQuiz()">開始特訓</button>
</div>

<div class="card" id="quiz-screen">
    <h1>窗簾計價</h1>
    <div class="stats">
        <span id="q-num">第 1 題</span>
        <span>✅ <span id="score-correct">0</span> | ❌ <span id="score-wrong">0</span></span>
    </div>
    
    <div class="question-box" id="question-text">載入題目中...</div>
    
    <div id="display-area">0</div>

    <div class="keypad" id="keypad">
        <button class="key" onclick="inputNum(1)">1</button><button class="key" onclick="inputNum(2)">2</button><button class="key" onclick="inputNum(3)">3</button>
        <button class="key" onclick="inputNum(4)">4</button><button class="key" onclick="inputNum(5)">5</button><button class="key" onclick="inputNum(6)">6</button>
        <button class="key" onclick="inputNum(7)">7</button><button class="key" onclick="inputNum(8)">8</button><button class="key" onclick="inputNum(9)">9</button>
        <button class="key key-del" onclick="delNum()">⌫</button><button class="key" onclick="inputNum(0)">0</button>
        <button class="key key-ok" onclick="checkAnswer()">送出答案</button>
    </div>

    <button id="next-btn" class="btn-next" onclick="generateQuestion()">下一題</button>
    <button class="btn-report" onclick="finishQuiz()">結束測驗 & 產出報告</button>
    <div id="result-box" class="result"></div>
</div>

<div class="card" id="report-screen">
    <h1>結果戰報</h1>
    <div class="report-box" id="report-text"></div>
    <button onclick="copyReport()" style="background-color: #00B900;">📋 複製戰報 (回報 LINE)</button>
    <button onclick="location.reload()" style="background-color: #95a5a6;">重新開始</button>
</div>

<script>
    let currentQ = {}, qCount = 0, firstTryCorrectCount = 0, wrongCount = 0, attemptCount = 0, userName = "", startTime = null;

    function startQuiz() {
        const nameInput = document.getElementById('employee-name').value.trim();
        if (!nameInput) return alert("請輸入姓名！");
        userName = nameInput; startTime = new Date();
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        generateQuestion();
    }

    function inputNum(n) {
        let disp = document.getElementById('display-area');
        if (disp.innerText === '0') disp.innerText = n;
        else disp.innerText += n;
    }

    function delNum() {
        let disp = document.getElementById('display-area');
        disp.innerText = disp.innerText.slice(0, -1) || '0';
    }

    function getRandom10(min, max) {
        return Math.floor(Math.random() * ((max - min) / 10 + 1)) * 10 + min;
    }

    function getRandomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function generateQuestion() {
        qCount++; attemptCount = 0;
        document.getElementById('display-area').innerText = '0';
        document.getElementById('q-num').innerText = `第 ${qCount} 題`;
        document.getElementById('keypad').style.display = 'grid';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('result-box').style.display = 'none';

        const types = ['捲簾', '調光簾', '木百葉', '風琴簾', '穿透簾', '拉門', '五尺折景簾', '五尺蛇簾', '九尺折景簾', '九尺蛇簾'];
        const type = getRandomItem(types);
        const w = Math.floor(Math.random() * (380 - 60 + 1)) + 60;
        const h = Math.floor(Math.random() * (265 - 90 + 1)) + 90;
        
        let unitPrice = 0, trackPrice = 0, multi = 0;
        if (type === '捲簾') unitPrice = getRandom10(110, 150);
        else if (type === '調光簾') unitPrice = getRandom10(130, 350);
        else if (type === '木百葉') unitPrice = getRandom10(280, 400);
        else if (type === '風琴簾') unitPrice = getRandom10(240, 480);
        else if (type === '穿透簾') unitPrice = getRandom10(250, 480);
        else if (type === '拉門') unitPrice = 100;
        else if (type.includes('五尺')) unitPrice = getRandom10(100, 250);
        else if (type.includes('九尺')) unitPrice = getRandom10(280, 450);

        if (type.includes('折景')) { multi = getRandomItem([2.0, 2.1, 2.2, 2.3, 2.4, 2.5]); trackPrice = 60; }
        else if (type.includes('蛇簾')) { multi = getRandomItem([2.7, 2.8, 2.9, 3.0, 3.1, 3.2, 3.3]); trackPrice = 130; }

        const w_ft = Math.ceil((w / 30.3) * 10) / 10;
        const h_ft = Math.ceil((h / 30.3) * 10) / 10;
        let total = 0;
        let processText = `尺寸: ${w}x${h}cm (${w_ft}x${h_ft}尺)\n`;

        if (['捲簾', '調光簾', '木百葉', '風琴簾', '穿透簾'].includes(type)) {
            let area = Math.ceil(w_ft * h_ft);
            let finalArea = Math.max(area, (type === '穿透簾' ? 35 : 15));
            total = finalArea * unitPrice;
            processText += `才數: ${finalArea} × 單價 ${unitPrice} = ${total}元`;
        } else if (type === '拉門') {
            let h_door = Math.max(7, Math.ceil(h_ft));
            let area = Math.ceil(w_ft * h_door);
            total = Math.max(area, 20) * unitPrice;
            processText += `拉門高度進位至 ${h_door}尺\n才數: ${Math.max(area, 20)} × 單價 ${unitPrice} = ${total}元`;
        } else {
            let track_ft = Math.max(5, Math.ceil(w_ft));
            let totalTrack = track_ft * trackPrice;
            if (type.includes('五尺')) {
                let panels = Math.ceil((w_ft * multi) / 5);
                let h_fab = Math.ceil(h_ft) + 1;
                let totalFab = Math.ceil(panels * h_fab);
                total = (totalFab * unitPrice) + totalTrack;
                processText += `幅數: ${panels}幅, 用布高: ${h_fab}尺, 總尺: ${totalFab}\n布價: ${totalFab * unitPrice} + 軌道: ${totalTrack} = ${total}元`;
            } else {
                let totalFab = Math.ceil(w_ft * multi);
                let effectivePrice = (h > 250) ? unitPrice + 30 : unitPrice;
                total = (totalFab * effectivePrice) + totalTrack;
                processText += `布總長: ${totalFab}尺\n布價: ${totalFab * effectivePrice} + 軌道: ${totalTrack} = ${total}元`;
            }
        }
        currentQ = { total: total, explanation: processText };
        document.getElementById('question-text').innerText = `${type} | ${w}x${h}cm`;
    }

    function checkAnswer() {
        const userAns = parseInt(document.getElementById('display-area').innerText);
        attemptCount++;
        const resBox = document.getElementById('result-box');
        resBox.style.display = 'block';

        if (attemptCount === 1) {
            if (userAns === currentQ.total) firstTryCorrectCount++;
            else wrongCount++;
        }

        if (userAns === currentQ.total) {
            resBox.className = 'result correct';
            resBox.innerText = `✅ 答對了！\n${currentQ.explanation}`;
            document.getElementById('keypad').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('score-correct').innerText = `完美答對: ${firstTryCorrectCount}`;
            document.getElementById('score-wrong').innerText = `答錯: ${wrongCount}`;
        } else {
            resBox.className = 'result wrong';
            if (attemptCount < 3) resBox.innerText = `❌ 答錯了，請再算一次！(第 ${attemptCount} 次)`;
            else resBox.innerText = `❌ 錯誤！正確答案是: ${currentQ.total}\n${currentQ.explanation}`;
        }
    }

    function finishQuiz() {
        const endTime = new Date();
        const timeDiff = Math.floor((endTime - startTime) / 1000);
        const report = `📋【歐昇特訓戰報】\n姓名：${userName}\n時長：${Math.floor(timeDiff/60)}分${timeDiff%60}秒\n✅ 完美答對：${firstTryCorrectCount}\n❌ 答錯：${wrongCount}`;
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('report-screen').style.display = 'block';
        document.getElementById('report-text').innerText = report;
    }

    function copyReport() {
        navigator.clipboard.writeText(document.getElementById('report-text').innerText).then(() => alert("已複製！"));
    }
</script>

</body>
</html>
